- id: responsible-ai-engineering
  title: "Responsible AI Engineering"
  description: >
    Designing, building, and evaluating AI systems that are accountable, transparent,
    and aligned with human values. We develop methods for verifying, testing, and
    auditing AI software throughout the engineering lifecycle.

- id: llms-coding-agents
  title: "LLMs and Coding Agents"
  description: >
    Studying how large language models reason, plan, and generate code. We investigate
    LLM reasoning capabilities, coding agent reliability, bias in LLM outputs, and
    the technical debt that arises when LLMs are used in software development.

- id: ai-technical-debt
  title: "AI-Accelerated Technical Debt"
  description: >
    Understanding, measuring, and managing technical debt in AI and ML software
    systems. We study self-admitted technical debt in ML pipelines and how AI coding
    tools such as GitHub Copilot introduce or help resolve technical debt.

- id: fairness-safety-reliability
  title: "Fairness, Safety, and Reliability"
  description: >
    Formal verification and empirical analysis of fairness, safety, and reliability
    properties in ML-enabled systems. Topics include long-term fairness under feedback
    loops, compositional fairness in pipelines, and safe ML system design.

- id: software-engineering-for-ai
  title: "Software Engineering for AI"
  description: >
    Applying software engineering principles—architecture, testing, maintenance,
    and quality—to AI and ML systems. We study data science pipelines, ML system
    architecture, and engineering practices for AI-enabled software.

- id: responsible-ai-design
  title: "Responsible AI Design"
  description: >
    Architectural and design-level approaches for embedding responsibility into
    AI systems. We explore fair AutoML, causal reasoning for fairness in ML
    pipelines, and compositional approaches to building trustworthy AI systems.
