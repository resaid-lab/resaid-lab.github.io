- id: responsible-ai-engineering
  title: "Responsible AI Engineering"
  description: >
    Designing, building, and evaluating AI systems that are fair, safe, reliable,
    accountable, and aligned with human values. We develop methods for verifying,
    testing, and auditing AI software throughout the engineering lifecycle—spanning
    long-term fairness under feedback loops, compositional fairness in pipelines,
    and trustworthy system design.

- id: llms-coding-agents
  title: "LLMs and Coding Agents"
  description: >
    Studying how large language models reason, plan, and generate code. We investigate
    LLM reasoning capabilities, coding agent reliability, bias in LLM outputs, and
    the technical debt that arises when LLMs are used in software development.

- id: formal-verification-program-analysis
  title: "Formal Verification and Program Analysis"
  description: >
    Applying formal methods, static and dynamic program analysis, and verification
    techniques to reason about correctness, safety, and fairness properties of
    software and ML-enabled systems. We build tools that provide provable guarantees
    and detect defects in AI software.

- id: software-engineering-for-ai
  title: "Software Engineering for AI"
  description: >
    Applying software engineering principles—architecture, testing, maintenance,
    and quality—to AI and ML systems. We study data science pipelines, ML system
    architecture, and engineering practices for AI-enabled software.
