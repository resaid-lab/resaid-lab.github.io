<div class="cite-modal" data-cite-modal hidden>
  <div class="cite-backdrop" data-cite-close></div>
  <section class="cite-dialog" role="dialog" aria-modal="true" aria-labelledby="cite-modal-title">
    <div class="cite-dialog-header">
      <div>
        <h2 id="cite-modal-title">BibTeX</h2>
        <p class="cite-paper-title" data-cite-paper-title></p>
      </div>
      <button type="button" class="cite-close-button" data-cite-close>Close</button>
    </div>
    <pre class="cite-bibtex"><code data-cite-output></code></pre>
    <div class="cite-actions">
      <button type="button" class="cite-copy-button" data-cite-copy>Copy BibTeX</button>
    </div>
  </section>
</div>
