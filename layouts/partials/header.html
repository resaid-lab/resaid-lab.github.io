<a href="#main-content" class="skip-link">Skip to main content</a>
<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a href="{{ "/" | relURL }}" class="site-brand">
        {{ partial "brand-mark.html" . }}
        <span class="site-brand-text"><span class="brand-re">re</span><span class="brand-said">S<span class="brand-ai">AI</span>D</span> Lab</span>
      </a>

      <button class="menu-toggle" aria-label="Open navigation menu" aria-expanded="false" aria-controls="site-nav">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <nav class="site-nav" id="site-nav" aria-label="Main navigation">
        <ul>
          {{ range .Site.Menus.main -}}
          {{- $active := or (eq $.RelPermalink .URL) (and (ne .URL "/") (hasPrefix $.RelPermalink .URL)) -}}
          <li{{ if eq .Name "Join Us" }} class="nav-join"{{ end }}>
            <a href="{{ .URL }}"{{ if $active }} class="active" aria-current="page"{{ end }}>
              {{- .Name -}}
            </a>
          </li>
          {{- end }}
        </ul>
      </nav>
    </div>
  </div>
</header>
