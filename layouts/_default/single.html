{{ define "main" }}

  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p>{{ . }}</p>{{ end }}
  </div>
</div>
<section class="section">
  <div class="container">
    <div class="rich-content">
      {{ .Content }}
    </div>
  </div>
</section>
{{ end }}
